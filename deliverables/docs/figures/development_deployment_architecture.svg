<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1060" viewBox="0 0 1600 1060" role="img" aria-labelledby="title desc">
  <title id="title">开发与部署架构图</title>
  <desc id="desc">展示本地开发环境、GitHub 协作、VPS 部署环境，以及开发阶段和运行阶段智能体的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zoneLocal { fill: #eef2ff; stroke: #a5b4fc; stroke-width: 1.5; rx: 18; }
      .zoneCloud { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; }
      .zoneVps { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; rx: 18; }
      .zoneRuntime { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.5; rx: 18; }
      .card { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.4; rx: 10; }
      .cardDark { fill: #0f172a; stroke: #0f172a; stroke-width: 1.4; rx: 10; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .section { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .boxTitle { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .boxTitleDark { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .boxText { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .boxTextDark { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #dbeafe; }
      .tag { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #334155; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .arrowSoft { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow); stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1060"/>

  <text class="title" x="80" y="60">开发与部署架构图</text>
  <text class="subtitle" x="80" y="92">从本地设计开发，到 GitHub 版本管理，再到 VPS 部署运行；开发智能体与应用智能体分工明确。</text>

  <rect class="zoneLocal" x="60" y="130" width="650" height="690"/>
  <text class="section" x="90" y="168">本地开发环境</text>

  <rect class="card" x="95" y="195" width="270" height="95"/>
  <text class="boxTitle" x="120" y="225">作者 / IDE</text>
  <text class="boxText" x="120" y="250">提出目标、审查结果、控制范围</text>
  <text class="boxText" x="120" y="272">编辑设计文档、代码和提交材料</text>

  <rect class="cardDark" x="405" y="195" width="265" height="95"/>
  <text class="boxTitleDark" x="430" y="225">开发阶段智能体</text>
  <text class="boxTextDark" x="430" y="250">Codex / Claude Code</text>
  <text class="boxTextDark" x="430" y="272">辅助规划、编码、检查、文档编写</text>

  <rect class="card" x="95" y="330" width="575" height="110"/>
  <text class="boxTitle" x="120" y="360">本地仓库 2026AgentApp</text>
  <text class="boxText" x="120" y="386">design_docs/：产品简报、技术决策、API/存储/部署设计</text>
  <text class="boxText" x="120" y="408">src/web_ui/：React Web 工作台</text>
  <text class="boxText" x="120" y="430">src/skills/、src/prompts/、src/agent/jobs/：智能体运行时材料</text>

  <rect class="card" x="95" y="480" width="270" height="110"/>
  <text class="boxTitle" x="120" y="510">本地验证</text>
  <text class="boxText" x="120" y="536">npm run validate:data</text>
  <text class="boxText" x="120" y="558">npm run build</text>
  <text class="boxText" x="120" y="580">job runner smoke test</text>

  <rect class="card" x="405" y="480" width="265" height="110"/>
  <text class="boxTitle" x="430" y="510">提交材料</text>
  <text class="boxText" x="430" y="536">deliverables/docs/</text>
  <text class="boxText" x="430" y="558">技术文档、演示脚本、架构图</text>
  <text class="boxText" x="430" y="580">正式 review 后再发布</text>

  <rect class="card" x="95" y="630" width="575" height="145"/>
  <text class="boxTitle" x="120" y="660">开发流程控制</text>
  <text class="boxText" x="120" y="686">设计文档 -> data contract -> sample data -> skill / prompt</text>
  <text class="boxText" x="120" y="708">job runner -> API trigger -> Web UI -> 验证和部署</text>
  <text class="boxText" x="120" y="730">通过 GitHub issue、label、milestone 和 release checklist 控制版本边界</text>
  <text class="boxText" x="120" y="752">多 agent 并行时，作者负责最终审查和范围确认</text>

  <path class="arrow" d="M 365 242 L 395 242"/>
  <path class="arrow" d="M 382 290 L 382 320"/>
  <path class="arrow" d="M 382 440 L 230 470"/>
  <path class="arrow" d="M 382 440 L 537 470"/>
  <path class="arrow" d="M 382 590 L 382 620"/>

  <rect class="zoneCloud" x="760" y="130" width="780" height="210"/>
  <text class="section" x="790" y="168">GitHub 协作与版本管理</text>

  <rect class="cardDark" x="800" y="195" width="270" height="95"/>
  <text class="boxTitleDark" x="825" y="225">GitHub Repository</text>
  <text class="boxTextDark" x="825" y="250">代码、设计文档、数据契约</text>
  <text class="boxTextDark" x="825" y="272">提交历史和远端同步</text>

  <rect class="card" x="1110" y="195" width="170" height="95"/>
  <text class="boxTitle" x="1135" y="225">Issues</text>
  <text class="boxText" x="1135" y="250">阶段任务</text>
  <text class="boxText" x="1135" y="272">实现计划</text>

  <rect class="card" x="1310" y="195" width="190" height="95"/>
  <text class="boxTitle" x="1335" y="225">Release 管理</text>
  <text class="boxText" x="1335" y="250">milestone / label</text>
  <text class="boxText" x="1335" y="272">tag / checklist</text>

  <path class="arrow" d="M 710 385 C 770 330 810 290 880 290"/>
  <text class="tag" x="715" y="360">commit / pull / sync</text>

  <rect class="zoneVps" x="760" y="385" width="780" height="435"/>
  <text class="section" x="790" y="423">VPS 部署环境</text>

  <rect class="card" x="790" y="450" width="245" height="95"/>
  <text class="boxTitle" x="825" y="480">源码目录</text>
  <text class="boxText" x="825" y="506">/opt/hermes/2026AgentApp/</text>
  <text class="boxText" x="825" y="528">拉取 main，执行构建和部署脚本</text>

  <rect class="card" x="1065" y="450" width="225" height="95"/>
  <text class="boxTitle" x="1090" y="480">Web 发布目录</text>
  <text class="boxText" x="1090" y="506">/var/www/hermes-web/</text>
  <text class="boxText" x="1090" y="528">Nginx 静态服务</text>

  <rect class="card" x="1320" y="450" width="175" height="95"/>
  <text class="boxTitle" x="1345" y="480">本地文件区</text>
  <text class="boxText" x="1345" y="506">/var/lib/hermes/data/</text>
  <text class="boxText" x="1345" y="528">上传文件、demo 数据</text>

  <rect class="zoneRuntime" x="790" y="585" width="705" height="185"/>
  <text class="section" x="830" y="623">VPS 运行时服务</text>

  <rect class="cardDark" x="825" y="650" width="210" height="85"/>
  <text class="boxTitleDark" x="860" y="680">Hermes Runtime</text>
  <text class="boxTextDark" x="860" y="704">skills / prompts / jobs</text>
  <text class="boxTextDark" x="860" y="724">学习洞察和周报生成</text>

  <rect class="card" x="1065" y="650" width="165" height="85"/>
  <text class="boxTitle" x="1090" y="680">Express API</text>
  <text class="boxText" x="1090" y="704">/api/hermes/jobs</text>
  <text class="boxText" x="1090" y="724">任务状态和结果</text>

  <rect class="card" x="1260" y="650" width="200" height="85"/>
  <text class="boxTitle" x="1285" y="680">SQLite</text>
  <text class="boxText" x="1285" y="704">上传记录、任务状态</text>
  <text class="boxText" x="1285" y="724">findings / memory</text>

  <path class="arrow" d="M 945 545 L 945 640"/>
  <path class="arrow" d="M 1035 692 L 1055 692"/>
  <path class="arrow" d="M 1230 692 L 1250 692"/>
  <path class="arrow" d="M 1407 545 L 1407 640"/>

  <path class="arrow" d="M 1070 242 L 1100 242"/>
  <path class="arrow" d="M 1280 242 L 1300 242"/>
  <path class="arrow" d="M 935 290 C 935 355 935 400 935 440"/>
  <text class="tag" x="955" y="365">deploy_web_ui.sh</text>

  <rect class="zoneCloud" x="760" y="835" width="780" height="135"/>
  <text class="section" x="790" y="872">运行时依赖的外部云服务</text>

  <rect class="card" x="805" y="895" width="205" height="52"/>
  <text class="boxTitle" x="830" y="918">LLM API</text>
  <text class="boxText" x="830" y="940">DeepSeek / OpenAI 等</text>

  <rect class="card" x="1040" y="895" width="230" height="52"/>
  <text class="boxTitle" x="1065" y="918">OCR / 图像切题服务</text>
  <text class="boxText" x="1065" y="940">试卷切题、题目文本识别</text>

  <rect class="card" x="1300" y="895" width="200" height="52"/>
  <text class="boxTitle" x="1325" y="918">对象存储 COS</text>
  <text class="boxText" x="1325" y="940">图片、PDF、归档文件</text>

  <path class="arrowSoft" d="M 930 735 C 930 790 908 835 908 880"/>
  <path class="arrowSoft" d="M 1148 650 C 1148 755 1155 820 1155 880"/>
  <path class="arrowSoft" d="M 1407 545 C 1470 640 1450 795 1400 880"/>

  <rect class="zoneCloud" x="60" y="850" width="650" height="150"/>
  <text class="section" x="90" y="888">两类智能体的分工</text>
  <text class="subtitle" x="90" y="918">开发阶段智能体帮助作者规划、实现、验证和写文档。</text>
  <text class="subtitle" x="90" y="946">运行阶段 Hermes Runtime 面向学习场景，处理教材、试卷、</text>
  <text class="subtitle" x="90" y="974">备注、记忆和周报。</text>
</svg>
